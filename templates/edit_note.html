{% extends "base.html" %}
{% block content %}
<h2>Edit Note</h2>
<form method="POST">
    <input type="text" name="title" value="{{ note.title }}" class="form-control mb-2" required>
    <textarea name="content" class="form-control mb-2" rows="5" required>{{ note.content }}</textarea>
    <button class="btn btn-primary">Save</button>
    <a href="{{ url_for('notes') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
