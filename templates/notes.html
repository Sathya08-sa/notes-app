{% extends "base.html" %}
{% block content %}
<h2>Your Notes</h2>

<form method="POST" class="mb-4">
    <input type="text" name="title" placeholder="Note title" class="form-control mb-2" required>
    <textarea name="content" placeholder="Write your note..." class="form-control mb-2" rows="3" required></textarea>
    <button class="btn btn-success">Add Note</button>
</form>

<hr>

{% for note in notes %}
    <div class="card mb-3">
        <div class="card-body">
            <h5>{{ note.title }}</h5>
            <p>{{ note.content }}</p>
            <small class="text-muted">{{ note.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
            <div class="mt-2">
                <a href="{{ url_for('edit_note', note_id=note.id) }}" class="btn btn-sm btn-warning">Edit</a>
                <form method="POST" action="{{ url_for('delete_note', note_id=note.id) }}" style="display:inline">
                    <button class="btn btn-sm btn-danger" onclick="return confirm('Delete this note?')">Delete</button>
                </form>
            </div>
        </div>
    </div>
{% else %}
    <p>No notes yet. Create one above!</p>
{% endfor %}
{% endblock %}
